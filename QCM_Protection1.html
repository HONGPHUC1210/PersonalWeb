<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCM Retraite — ISFA M2 Actuariat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+Pro:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    min-height: 100%;
    width: 100%;
    background: #f6f3ec;
    display: flex;
    justify-content: center;
    padding: 24px 12px;
    font-family: 'Source Serif Pro', Georgia, 'Times New Roman', serif;
  }
  .card {
    width: 100%;
    max-width: 680px;
    background: #ffffff;
    border-radius: 14px;
    border: 1px solid #e4ded2;
    padding: 28px 28px 24px;
    box-shadow: 0 1px 3px rgba(40,30,20,0.06);
  }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #8a6d3f;
    font-weight: 600;
  }
  select.qcm-select {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid #d8d4cc;
    background: #faf8f3;
    color: #4a4438;
    max-width: 220px;
  }
  .jump-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .jump-input {
    width: 56px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid #d8d4cc;
    background: #faf8f3;
    color: #4a4438;
  }
  .jump-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid #3a4a36;
    background: #fff;
    color: #3a4a36;
    cursor: pointer;
    font-weight: 600;
  }
  .progress-bar-bg {
    height: 6px;
    width: 100%;
    background: #ece7da;
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar-fg {
    height: 100%;
    background: #a8895c;
    transition: width 0.3s ease;
  }
  .meta-row {
    display: flex;
    justify-content: space-between;
    margin: 8px 0 18px;
  }
  .meta-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #8a8270;
  }
  .chap-tag {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.04em;
    color: #5d6e5c;
    background: #eef1e7;
    border: 1px solid #d4ddc8;
    padding: 3px 9px;
    border-radius: 5px;
    margin-right: 8px;
    margin-bottom: 8px;
  }
  .type-tag {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.04em;
    color: #7a5230;
    background: #f6ece0;
    border: 1px solid #e6d3b8;
    padding: 3px 9px;
    border-radius: 5px;
    margin-bottom: 8px;
  }
  .question-text {
    font-size: 20px;
    line-height: 1.4;
    color: #2b2722;
    margin: 8px 0 20px;
    font-weight: 600;
  }
  .options-wrap {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    border: 1.5px solid #d8d4cc;
    border-radius: 10px;
    padding: 13px 14px;
    font-size: 15px;
    font-family: 'Source Serif Pro', Georgia, serif;
    transition: background 0.15s ease, border-color 0.15s ease;
    background: #ffffff;
    color: #2b2722;
    cursor: pointer;
    text-align: left;
  }
  .option-btn.selected { background: #f1ece0; border-color: #a8895c; }
  .option-btn.validated-correct { background: #eaf4ee; border-color: #2f7d5f; color: #1d5c44; }
  .option-btn.validated-wrong { background: #fbeceb; border-color: #c4453a; color: #9c2f26; }
  .option-btn.validated-missed { background: #fffbe6; border-color: #b8940a; color: #7a5f00; }
  .option-btn.validated-disabled { cursor: default; }
  .option-marker {
    width: 18px; height: 18px; min-width: 18px;
    border: 2px solid #c9c2b4;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; background: transparent;
  }
  .option-marker.circle { border-radius: 50%; }
  .option-marker.square { border-radius: 4px; }
  .option-marker.marked { background: var(--marker-color, #a8895c); border-color: var(--marker-color, #a8895c); }
  .option-marker-inner { color: #fff; font-size: 11px; font-weight: 700; }
  .option-label { flex: 1; text-align: left; }
  .check-icon { color: #2f7d5f; font-weight: 700; font-size: 16px; }
  .cross-icon { color: #c4453a; font-weight: 700; font-size: 16px; }
  .warn-icon { color: #b8940a; font-weight: 700; font-size: 16px; }

  /* ---- Explanation box ---- */
  .explanation-box {
    margin-top: 18px;
    padding: 16px 18px;
    border-radius: 10px;
    border: 1.5px solid #2f7d5f;
    background: #fbfaf6;
  }
  .explanation-box.incorrect { border-color: #c4453a; }
  .explanation-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.03em;
    margin-bottom: 10px;
    color: #4a4438;
  }
  .expl-section {
    margin-bottom: 12px;
  }
  .expl-section:last-child { margin-bottom: 0; }
  .expl-lang-badge {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
    margin-bottom: 5px;
  }
  .badge-fr { background: #e8f0fd; color: #2a4db5; border: 1px solid #c4d4f5; }
  .badge-vn { background: #fde8e8; color: #b52a2a; border: 1px solid #f5c4c4; }
  .expl-text {
    font-size: 14px;
    line-height: 1.6;
    color: #3a352c;
  }
  .expl-divider {
    border: none;
    border-top: 1px dashed #e0dbd0;
    margin: 10px 0;
  }

  /* ---- Buttons ---- */
  .btn-row { display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap; }
  .primary-btn {
    flex: 1; min-width: 160px;
    background: #3a4a36; color: #fff;
    border: none; border-radius: 9px;
    padding: 13px 18px; font-size: 14.5px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600; letter-spacing: 0.02em;
    cursor: pointer;
  }
  .primary-btn:disabled { opacity: 0.5; cursor: default; }
  .secondary-btn {
    flex: 1; min-width: 160px;
    background: #fff; color: #3a4a36;
    border: 1.5px solid #3a4a36;
    border-radius: 9px; padding: 13px 18px;
    font-size: 14.5px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600; letter-spacing: 0.02em;
    cursor: pointer;
  }
  .retry-btn {
    flex: 1; min-width: 160px;
    background: #fff; color: #c4453a;
    border: 1.5px solid #c4453a;
    border-radius: 9px; padding: 13px 18px;
    font-size: 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600; letter-spacing: 0.02em;
    cursor: pointer;
  }

  /* ---- Result screen ---- */
  .result-title { font-size: 26px; margin: 4px 0 18px; color: #2b2722; }
  .score-circle {
    width: 130px; height: 130px; border-radius: 50%;
    border: 6px solid #a8895c;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }
  .score-num { font-size: 36px; font-weight: 700; color: #3a4a36; font-family: 'IBM Plex Mono', monospace; }
  .score-den { font-size: 14px; color: #8a8270; font-family: 'IBM Plex Mono', monospace; }
  .pct-text { text-align: center; font-size: 15px; color: #4a4438; margin-bottom: 22px; }
  .recap-list {
    display: flex; flex-direction: column; gap: 6px;
    max-height: 280px; overflow-y: auto;
    padding: 4px; border: 1px solid #ece7da;
    border-radius: 10px; margin-bottom: 16px;
  }
  .recap-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; font-size: 13px;
    font-family: 'IBM Plex Mono', monospace; color: #4a4438;
    cursor: pointer; border-radius: 6px;
    transition: background 0.1s;
  }
  .recap-item:hover { background: #f6f3ec; }
  .recap-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .recap-text { flex: 1; }
  .recap-retry-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 700;
    padding: 3px 8px; border-radius: 5px;
    border: 1px solid #c4453a; background: #fff;
    color: #c4453a; cursor: pointer;
  }
  .empty-text { font-size: 15px; color: #4a4438; }

  /* ---- Retry banner ---- */
  .retry-banner {
    background: #fff8e6;
    border: 1.5px solid #e8b84b;
    border-radius: 8px;
    padding: 8px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #7a5f00;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ---- Mobile responsive ---- */
  @media (max-width: 520px) {
    body { padding: 0; background: #ffffff; }
    .card {
      border-radius: 0;
      border: none;
      box-shadow: none;
      padding: 14px 14px 72px;
      min-height: 100vh;
    }
    .question-text { font-size: 17px; line-height: 1.35; margin: 6px 0 14px; }
    .option-btn { padding: 13px 11px; font-size: 14px; gap: 10px; border-radius: 9px; }
    .option-marker { width: 20px; height: 20px; min-width: 20px; }
    .option-marker-inner { font-size: 12px; }
    .primary-btn, .secondary-btn, .retry-btn {
      padding: 14px 12px;
      font-size: 13px;
      min-width: 0;
      border-radius: 8px;
    }
    .btn-row { gap: 8px; margin-top: 14px; flex-direction: column; }
    .btn-row .primary-btn, .btn-row .secondary-btn, .btn-row .retry-btn { flex: none; width: 100%; }
    .expl-text { font-size: 13px; line-height: 1.55; }
    .expl-lang-badge { font-size: 9px; }
    select.qcm-select { font-size: 11px; max-width: 140px; }
    .jump-input { width: 44px; font-size: 11px; }
    .jump-btn { padding: 5px 7px; font-size: 10px; }
    .jump-row { gap: 4px; }
    .meta-row { margin: 5px 0 12px; }
    .meta-text { font-size: 10px; }
    .chap-tag, .type-tag { font-size: 9.5px; padding: 2px 7px; }
    .score-circle { width: 100px; height: 100px; border-width: 5px; }
    .score-num { font-size: 28px; }
    .score-den { font-size: 12px; }
    .result-title { font-size: 20px; }
    .recap-list { max-height: 200px; }
    .recap-item { font-size: 11.5px; padding: 5px 8px; }
    .retry-banner { font-size: 11px; padding: 6px 10px; }
    .explanation-box { padding: 12px 13px; }
    .explanation-label { font-size: 11px; }
  }
</style>
</head>
<body>
<div class="card" id="app"></div>

<script>
// ============================================================
// QCM RETRAITE v3 — ISFA M2 ACTUARIAT
// 28 câu Đề thi Session 1 (giữ nguyên thứ tự ưu tiên)
// Tính năng mới:
//   - Nút "Refaire" khi sai → làm lại câu đó ngay
//   - Đảo thứ tự options mỗi lần (shuffleOptions)
//   - Giải thích song ngữ FR / VI
// ============================================================
const QUESTIONS_MASTER = [
  {
    "id": 1,
    "chapitre": "[ĐỀ THI PS] Ticket Modérateur – Acte Lourd",
    "type": "single",
    "question": "Question 1 (Đề thi). Quel est le montant du Ticket Modérateur pour un acte de chirurgie considéré comme un acte lourd sachant : que l'intervention a été facturée 1200€, que le taux de Remboursement Sécurité sociale est de 100% et que la base de remboursement est de 250€ ?",
    "options": [
      "250€",
      "950€",
      "18€",
      "32€",

    ],
    "correct": [5],
    "explication_fr": "Pour un acte lourd (coefficient ≥ 60 ou tarif > 120€), le Ticket Modérateur est exonéré à 100%.\n\nLe taux de RSS est donné à 100% → donc TM = 0%.\n\nCependant, il reste une franchise forfaitaire de 24€ sur les actes lourds (forfait actes lourds). Mais attention : si le taux de remboursement est 100%, le TM est nul, et la franchise de 24€ s'applique SEULEMENT pour les actes dont le coefficient ≥ 60 MAIS qui ne sont pas exonérés à 100%. Ici, taux RSS = 100% → TM = 0€.",
    "explication_vn": "Đối với acte lourd (hệ số ≥ 60 hoặc giá > 120€), Ticket Modérateur được miễn.\n\nĐề bài cho tỷ lệ hoàn trả SS = 100% → TM = (100% - 100%) × BR = 0€.\n\nNhớ: Khi tỷ lệ hoàn trả SS = 100%, phần người bệnh tự trả (TM) = 0. Đáp án: 0€."
  },
  {
    "id": 2,
    "chapitre": "[ĐỀ THI PS] Reste à charge – Contrat Responsable",
    "type": "single",
    "question": "Question 2 (Đề thi). Quel est le reste à charge pour un assuré couvert par un contrat responsable lors de l'achat d'un médicament à 10€ remboursé à 65% par la Sécurité sociale ?",
    "options": [
      "10,00€",
      "3,50€",
      "0€",
      "4,50€"
    ],
    "correct": [2],
    "explication_fr": "Médicament à 10€, taux SS = 65%.\n\nBase de Remboursement (BR) = 10€ (prix = BR pour les médicaments à vignette blanche).\n\nRemboursement SS = 65% × 10€ = 6,50€\nTicket Modérateur = 35% × 10€ = 3,50€\n\nLe contrat responsable doit obligatoirement prendre en charge le Ticket Modérateur (à l'exception des médicaments à 15% et 30% et des cures thermales). Les médicaments à 65% (vignette blanche) sont bien pris en charge.\n\nDonc : RAC = 0€ pour l'assuré avec contrat responsable.",
    "explication_vn": "Thuốc 10€, tỷ lệ SS = 65%.\n\nSS hoàn trả: 65% × 10€ = 6,50€\nTicket Modérateur: 35% × 10€ = 3,50€\n\nContrat responsable BẮT BUỘC phải hoàn trả Ticket Modérateur (trừ thuốc 15%, 30% và cures thermales). Thuốc vignette blanche (65%) thuộc diện bắt buộc thanh toán.\n\n→ Reste à charge = 0€."
  },
  {
    "id": 3,
    "chapitre": "[ĐỀ THI PS] Prestations en nature – Branche Maladie",
    "type": "single",
    "question": "Question 3 (Đề thi). Comment appelle-t-on les prestations versées par le régime général de la Sécurité Sociale pour le remboursement des dépenses de santé dans la branche maladie ?",
    "options": [
      "Prestations en espèce",
      "Prestations en nature",
      "Prestations tiers payant",
      "Indemnités"

    "correct": [1],
    "explication_fr": "Les prestations de la Sécurité Sociale dans la branche Maladie se divisent en deux grandes catégories :\n• Prestations en nature : remboursements des soins (consultations, médicaments, hospitalisation, etc.)\n• Prestations en espèce : indemnités journalières versées en cas d'arrêt de travail\n\nLe remboursement des dépenses de santé = prestations EN NATURE.\n\nLe tiers payant est une modalité de paiement (l'organisme paye directement le professionnel), pas un type de prestation.",
    "explication_vn": "Bảo hiểm Xã hội (Sécurité Sociale) có 2 loại quyền lợi chính:\n• Prestations en nature: hoàn trả chi phí khám chữa bệnh, thuốc, nhập viện → đây là câu hỏi hỏi\n• Prestations en espèce: trợ cấp ngày nghỉ ốm (indemnités journalières)\n\nTiers payant chỉ là cách thanh toán (cơ quan BH thanh toán trực tiếp), không phải loại quyền lợi.\n\n→ Đáp án: Prestations en nature."
  },
  {
    "id": 4,
    "chapitre": "[ĐỀ THI PS] Secteur 2 – OPTAM",
    "type": "single",
    "question": "Question 4 (Đề thi). Un médecin 'secteur 2' a le droit d'adhérer à l'OPTAM ?",
    "options": [
      "Vrai",
      "Faux"
    ],
    "correct": [0],
    "explication_fr": "OPTAM = Option Pratique Tarifaire Maîtrisée.\n\nL'OPTAM est un dispositif destiné à limiter les dépassements d'honoraires. Il est ouvert aux médecins de secteur 2 (à honoraires libres) qui s'engagent à pratiquer un certain pourcentage de leurs actes sans dépassement d'honoraires, en échange d'une meilleure prise en charge par les complémentaires santé.\n\nDonc VRAI : un médecin secteur 2 PEUT adhérer à l'OPTAM.",
    "explication_vn": "OPTAM = Option Pratique Tarifaire Maîtrisée → công cụ kiểm soát depassements d'honoraires.\n\nBác sĩ secteur 2 (có quyền tính phí vượt mức) CÓ THỂ tham gia OPTAM nếu cam kết thực hiện một tỷ lệ nhất định các ca khám không tính phí vượt. Đổi lại, các complémentaires santé sẽ hoàn trả tốt hơn cho bệnh nhân của họ.\n\n→ ĐÚNG: bác sĩ secteur 2 có quyền tham gia OPTAM."
  },
  {
    "id": 5,
    "chapitre": "[ĐỀ THI PS] Organismes Assureurs – Assurance Collective",
    "type": "single",
    "question": "Question 5 (Đề thi). Quel type d'organisme assureur est historiquement spécialisé sur l'assurance collective ?",
    "options": [
      "Mutuelles",
      "Institutions de Prévoyance",
      "Sociétés d'assurance"
    ],
    "correct": [1],
    "explication_fr": "Les Institutions de Prévoyance (IP) sont régies par le Livre IX du Code de la Sécurité Sociale. Ce sont des personnes morales de droit privé à but NON LUCRATIF, administrées paritairement.\n\nL'essentiel de leur activité relève de la Prévoyance COLLECTIVE (Prévoyance et Santé à 50/50). Elles ont une forte implication dans le secteur de la Prévoyance notamment grâce aux anciennes clauses de désignation dans les Conventions Collectives.\n\nHistoriquement : IP → assurance collective / Mutuelles → Frais de Santé individuel.",
    "explication_vn": "Institutions de Prévoyance (IP) là tổ chức phi lợi nhuận (but non lucratif) quản lý theo nguyên tắc paritaire (đồng đẳng giữa người lao động và chủ lao động).\n\nHoạt động chủ yếu: Prévoyance TẬP THỂ (collective) → đây là đặc điểm lịch sử phân biệt với Mutuelles (chuyên cá nhân/frais de santé).\n\n→ Đáp án: Institutions de Prévoyance."
  },
  {
    "id": 6,
    "chapitre": "[ĐỀ THI PS] Forfait Actes Lourds",
    "type": "single",
    "question": "Question 6 (Đề thi). Quel est le montant minimum de la base de remboursement au-delà duquel s'applique le 'forfait actes lourds' (ticket modérateur forfaitaire) ?",
    "options": [
      "18€",
      "24€",
      "120€",
      "90€"
    ],
    "correct": [2],
    "explication_fr": "Le 'forfait actes lourds' ou ticket modérateur forfaitaire s'applique pour les actes dont le tarif de responsabilité est supérieur à 120€ (ou coefficient ≥ 60 en NGAP).\n\nDans ce cas, au lieu de calculer le TM normalement (30% × BR), une franchise forfaitaire de 24€ est appliquée à la place du TM habituel (si le TM calculé est supérieur à 24€).\n\nDonc le seuil de déclenchement = 120€ de Base de Remboursement.",
    "explication_vn": "Forfait actes lourds áp dụng khi tarif (Base de Remboursement) vượt quá 120€ (hoặc hệ số ≥ 60 theo NGAP).\n\nKhi đó, thay vì tính TM bình thường (30% × BR), một khoản forfaitaire 24€ được áp dụng.\n\n→ Ngưỡng kích hoạt: 120€ BR."
  },
  {
    "id": 7,
    "chapitre": "[ĐỀ THI PS] Reste à charge – Définition",
    "type": "single",
    "question": "Question 7 (Đề thi). Qu'appelle-t-on le 'reste à charge' en Frais de santé ?",
    "options": [
      "La différence entre les frais réels et les remboursements de la Sécurité sociale et des contrats complémentaires",
      "La différence entre les frais réels et la base de remboursement de la Sécurité sociale",
      "La différence entre la Base de remboursement et le remboursement de la Sécurité Sociale"
    ],

// ============================================================
// State
// ============================================================
let order = QUESTIONS_MASTER.map(q => q.id);
let idx = 0;
let selectedRaw = [];      // indices dans currentShuffledOptions
let validated = false;
let score = 0;
let answers = {};          // id -> {selectedOriginalIndices, ok}
let finished = false;
let filterChapitre = "Tous";
let retryMode = false;     // true = mode "refaire une question"
let retryQuestionId = null;
let retrySourceIdx = null; // idx of the question being retried → resume from idx+1 after retry
// shuffled options per question-display: id -> [{origIdx, text}]
let shuffledOptionsCache = {};

// ============================================================
// Helpers
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getChapitres() {
  const set = new Set(QUESTIONS_MASTER.map(q => q.chapitre));
  return ["Tous", ...Array.from(set)];
}

function getActiveIds() {
  if (filterChapitre === "Tous") return order;
  return order.filter(id => {
    const q = QUESTIONS_MASTER.find(qq => qq.id === id);
    return q && q.chapitre === filterChapitre;
  });
}

function getCurrentQ() {
  if (retryMode && retryQuestionId !== null) {
    return QUESTIONS_MASTER.find(q => q.id === retryQuestionId);
  }
  const activeIds = getActiveIds();
  if (idx >= activeIds.length) return null;
  return QUESTIONS_MASTER.find(q => q.id === activeIds[idx]);
}

function getShuffledOptions(q) {
  const cacheKey = retryMode ? `retry_${q.id}` : `${q.id}_${idx}`;
  if (!shuffledOptionsCache[cacheKey]) {
    const opts = q.options.map((text, origIdx) => ({ origIdx, text }));
    shuffledOptionsCache[cacheKey] = shuffle(opts);
  }
  return shuffledOptionsCache[cacheKey];
}

function isCorrectAnswer(q, selectedOriginalIndices) {
  const correctSet = new Set(q.correct);
  const selSet = new Set(selectedOriginalIndices);
  if (correctSet.size !== selSet.size) return false;
  for (const c of correctSet) if (!selSet.has(c)) return false;
  return true;
}

function esc(s) {
  const d = document.createElement('div');
  d.innerText = s;
  return d.innerHTML;
}

function escNL(s) {
  return esc(s).replace(/\n/g, '<br>');
}

// ============================================================
// Actions
// ============================================================
function toggleOption(shuffledIdx) {
  if (validated) return;
  const currentQ = getCurrentQ();
  if (currentQ.type === "single") {
    selectedRaw = [shuffledIdx];
  } else {
    if (selectedRaw.includes(shuffledIdx)) {
      selectedRaw = selectedRaw.filter(x => x !== shuffledIdx);
    } else {
      selectedRaw = [...selectedRaw, shuffledIdx];
    }
  }
  render();
}

function handleValidate() {
  if (selectedRaw.length === 0 || validated) return;
  const currentQ = getCurrentQ();
  const shuffled = getShuffledOptions(currentQ);
  // Convert shuffled indices to original indices
  const selectedOriginalIndices = selectedRaw.map(si => shuffled[si].origIdx);
  const ok = isCorrectAnswer(currentQ, selectedOriginalIndices);
  validated = true;
  if (!retryMode) {
    score += ok ? 1 : 0;
    answers[currentQ.id] = { selectedOriginalIndices, ok };
  }
  render();
}

function handleNext() {
  if (retryMode) {
    // After retrying: go to the NEXT question after the one we retried
    retryMode = false;
    retryQuestionId = null;
    selectedRaw = [];
    validated = false;
    const activeIds = getActiveIds();
    const nextIdx = (retrySourceIdx !== null) ? retrySourceIdx + 1 : idx + 1;
    retrySourceIdx = null;
    if (nextIdx >= activeIds.length) {
      finished = true;
    } else {
      idx = nextIdx;
    }
    render();
    return;
  }
  const activeIds = getActiveIds();
  if (idx + 1 >= activeIds.length) {
    finished = true;
    render();
    return;
  }
  idx++;
  selectedRaw = [];
  validated = false;
  render();
}

function handleRetryQuestion(questionId) {
  // Enter retry mode: save current position to resume after
  retrySourceIdx = idx; // remember where we were
  retryMode = true;
  retryQuestionId = questionId;
  finished = false;
  selectedRaw = [];
  validated = false;
  // Clear shuffled cache so options get reshuffled
  Object.keys(shuffledOptionsCache).forEach(k => {
    if (k.startsWith('retry_')) delete shuffledOptionsCache[k];
  });
  render();
}

function handleRestart(shuffleQ) {
  order = shuffleQ ? shuffle(QUESTIONS_MASTER.map(q => q.id)) : QUESTIONS_MASTER.map(q => q.id);
  idx = 0;
  selectedRaw = [];
  validated = false;
  score = 0;
  answers = {};
  finished = false;
  retryMode = false;
  retryQuestionId = null;
  retrySourceIdx = null;
  shuffledOptionsCache = {};
  render();
}

function handleFilterChange(ch) {
  filterChapitre = ch;
  idx = 0;
  selectedRaw = [];
  validated = false;
  score = 0;
  answers = {};
  finished = false;
  retryMode = false;
  retryQuestionId = null;
  shuffledOptionsCache = {};
  render();
}

function handleJump() {
  const input = document.getElementById('jumpInput');
  const targetId = parseInt(input.value, 10);
  if (!targetId) return;
  const q = QUESTIONS_MASTER.find(qq => qq.id === targetId);
  if (!q) { alert("ID introuvable"); return; }
  if (filterChapitre !== "Tous" && q.chapitre !== filterChapitre) {
    filterChapitre = "Tous";
  }
  finished = false;
  retryMode = false;
  const activeIds = getActiveIds();
  const newIdx = activeIds.indexOf(targetId);
  if (newIdx === -1) return;
  idx = newIdx;
  selectedRaw = [];
  validated = false;
  render();
}

// ============================================================
// Render
// ============================================================
function renderFinished() {
  const activeIds = getActiveIds();
  const total = activeIds.length;
  const pct = total > 0 ? Math.round((score / total) * 100) : 0;

  const recapHtml = activeIds.map(id => {
    const q = QUESTIONS_MASTER.find(qq => qq.id === id);
    const a = answers[id];
    const ok = a && a.ok;
    const dotColor = ok ? "#2f7d5f" : "#c4453a";
    const retryBtn = !ok
      ? `<button class="recap-retry-btn" onclick="handleRetryQuestion(${id})">↩ Refaire</button>`
      : '';
    return `
      <div class="recap-item">
        <span class="recap-dot" style="background:${dotColor}"></span>
        <span class="recap-text">Q${id} — ${esc(q ? q.chapitre : '')}</span>
        ${retryBtn}
      </div>`;
  }).join("");

  return `
    <div class="header-badge">Retraite · QCM</div>
    <h1 class="result-title">Résultats</h1>
    <div class="score-circle">
      <span class="score-num">${score}</span>
      <span class="score-den">/ ${total}</span>
    </div>
    <p class="pct-text">${pct}% de bonnes réponses</p>
    <div class="recap-list">${recapHtml}</div>
    <div class="btn-row">
      <button class="primary-btn" onclick="handleRestart(false)">Recommencer (ordre initial)</button>
      <button class="secondary-btn" onclick="handleRestart(true)">Recommencer (aléatoire)</button>
    </div>`;
}

function renderQuestion() {
  const activeIds = getActiveIds();
  const currentQ = getCurrentQ();

  if (!currentQ) {
    return `<div class="header-badge">Retraite · QCM</div><p class="empty-text">Aucune question pour ce filtre.</p>`;
  }

  const shuffled = getShuffledOptions(currentQ);
  // Convert selectedRaw (shuffled indices) to original indices for correctness check
  const selectedOriginalIndices = selectedRaw.map(si => shuffled[si].origIdx);
  const isOk = validated ? isCorrectAnswer(currentQ, selectedOriginalIndices) : false;

  const progressPct = retryMode
    ? ((retrySourceIdx !== null ? retrySourceIdx : idx) + 1) / activeIds.length * 100
    : ((idx + 1) / activeIds.length) * 100;
  const chapitres = getChapitres();

  const selectHtml = `
    <div class="jump-row">
      <select class="qcm-select" onchange="handleFilterChange(this.value)">
        ${chapitres.map(c => `<option value="${esc(c)}" ${c === filterChapitre ? "selected" : ""}>${esc(c)}</option>`).join("")}
      </select>
      <input id="jumpInput" class="jump-input" type="number" min="1" placeholder="ID" />
      <button class="jump-btn" onclick="handleJump()">Aller</button>
    </div>`;

  const retryBanner = retryMode
    ? `<div class="retry-banner">🔄 Mode refaire — Question ${retryQuestionId}</div>`
    : '';

  const optionsHtml = shuffled.map(({ origIdx, text }, si) => {
    const isSelected = selectedRaw.includes(si);
    const isCorrect = currentQ.correct.includes(origIdx);
    const isWrong = isSelected && !isCorrect;
    const isMissed = validated && isCorrect && !isSelected;

    let stateClass = "";
    let markerColor = "#a8895c";
    if (validated) {
      if (isCorrect && isSelected) { stateClass = "validated-correct"; markerColor = "#2f7d5f"; }
      else if (isWrong) { stateClass = "validated-wrong"; markerColor = "#c4453a"; }
      else if (isMissed) { stateClass = "validated-missed"; markerColor = "#b8940a"; }
    } else if (isSelected) {
      stateClass = "selected";
    }

    const markerShape = currentQ.type === "single" ? "circle" : "square";
    const markerMarked = isSelected ? "marked" : "";
    const markerInner = isSelected ? (currentQ.type === "single" ? "●" : "✓") : "";
    const rightIcon = validated
      ? (isCorrect && isSelected ? '<span class="check-icon">✓</span>'
        : isWrong ? '<span class="cross-icon">✕</span>'
        : isMissed ? '<span class="warn-icon">!</span>'
        : '')
      : '';

    return `
      <button class="option-btn ${stateClass} ${validated ? 'validated-disabled' : ''}"
        onclick="toggleOption(${si})" ${validated ? "disabled" : ""}>
        <span class="option-marker ${markerShape} ${markerMarked}" style="--marker-color:${markerColor}">
          <span class="option-marker-inner">${markerInner}</span>
        </span>
        <span class="option-label">${esc(text)}</span>
        ${rightIcon}
      </button>`;
  }).join("");

  // Explanation block
  let explanationHtml = "";
  if (validated) {
    const statusLabel = isOk ? "✓ Correct" : "✕ Incorrect";
    const boxClass = isOk ? "" : "incorrect";
    const frHtml = currentQ.explication_fr
      ? `<div class="expl-section">
          <span class="expl-lang-badge badge-fr">🇫🇷 Français</span>
          <div class="expl-text">${escNL(currentQ.explication_fr)}</div>
        </div>`
      : '';
    const vnHtml = currentQ.explication_vn
      ? `<hr class="expl-divider">
         <div class="expl-section">
          <span class="expl-lang-badge badge-vn">🇻🇳 Tiếng Việt</span>
          <div class="expl-text">${escNL(currentQ.explication_vn)}</div>
        </div>`
      : '';
    explanationHtml = `
      <div class="explanation-box ${boxClass}">
        <div class="explanation-label">${statusLabel} — Explication</div>
        ${frHtml}${vnHtml}
      </div>`;
  }

  // Buttons
  let btnHtml = '';
  if (!validated) {
    btnHtml = `<button class="primary-btn" onclick="handleValidate()" ${selectedRaw.length === 0 ? "disabled" : ""}>Valider</button>`;
  } else {
    // Compute what "next" means: after retry → go to retrySourceIdx+1; normal → idx+1
    const nextIdxAfterRetry = (retrySourceIdx !== null) ? retrySourceIdx + 1 : idx + 1;
    let nextLabel;
    if (retryMode) {
      nextLabel = nextIdxAfterRetry >= activeIds.length
        ? "Voir les résultats →"
        : `Continuer — Q${nextIdxAfterRetry + 1}/${activeIds.length} →`;
    } else {
      nextLabel = idx + 1 >= activeIds.length ? "Voir les résultats" : "Question suivante →";
    }
    btnHtml = `<button class="primary-btn" onclick="handleNext()">${nextLabel}</button>`;
    if (!isOk && !retryMode) {
      btnHtml += `<button class="retry-btn" onclick="handleRetryQuestion(${currentQ.id})">↩ Refaire cette question</button>`;
    }
  }

  const qLabel = retryMode
    ? `🔄 Refaire Q${currentQ.id} (position ${(retrySourceIdx !== null ? retrySourceIdx : idx) + 1}/${activeIds.length})`
    : `Question ${idx + 1} / ${activeIds.length}`;

  return `
    <div class="top-row">
      <div class="header-badge">Retraite · QCM</div>
      ${selectHtml}
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fg" style="width:${progressPct}%"></div>
    </div>
    <div class="meta-row">
      <span class="meta-text">${qLabel}</span>
      <span class="meta-text">Score: ${score}</span>
    </div>
    ${retryBanner}
    <div class="chap-tag">${esc(currentQ.chapitre)}</div>
    <div class="type-tag">${currentQ.type === "single" ? "Réponse unique" : "Réponses multiples"}</div>
    <h2 class="question-text">${esc(currentQ.question)}</h2>
    <div class="options-wrap">${optionsHtml}</div>
    ${explanationHtml}
    <div class="btn-row">${btnHtml}</div>`;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = finished ? renderFinished() : renderQuestion();
}

render();
</script>
